<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万年历 Lunar Clock</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b71c1c">
    <style>
        :root { --bg: #f5f3ef; --accent: #b71c1c; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .time { font-size: 4rem; color: var(--accent); font-weight: bold; }
        .lunar-info { font-size: 1.5rem; margin-top: 10px; color: #555; }
        .btn-group { margin-top: 30px; }
        button { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 5px; }
        /* 弹窗 */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1001; width: 85%; max-width: 350px; text-align: center; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; }
    </style>
</head>
<body>

    <div class="time" id="clock">00:00:00</div>
    <div class="lunar-info" id="lunar">加载中...</div>

    <div class="btn-group">
        <button onclick="showCountdown()">节日倒计时</button>
        <button onclick="shareApp()">分享给好友</button>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <h2 id="modal-title">节日倒计时</h2>
        <div id="modal-content"></div>
        <br>
        <button onclick="closeModal()">返回</button>
    </div>

    <script>
        // --- 1. 简繁体字典与农历逻辑 ---
        const dictionary = { "时": "時", "马": "馬", "龙": "龍" }; // 示例，请保留您完整的字典

        function getLunarData(date) {
            // 这里放入您原本庞大的农历计算逻辑和数据
            return "丙午年 二月初九"; 
        }

        // --- 2. 时钟更新 ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
            document.getElementById('lunar').innerText = getLunarData(now);
        }
        setInterval(updateClock, 1000);

        // --- 3. 快捷方式逻辑 ---
        function handlePwaActions() {
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');
            if (action === 'countdown') showCountdown();
            if (action === 'today') alert("今日农历详情已在主页显示");
        }

        // --- 4. 功能函数 ---
        function showCountdown() {
            document.getElementById('modal-title').innerText = "🏮 节日倒计时";
            document.getElementById('modal-content').innerHTML = "离清明节还有 9 天<br>离端午节还有 65 天";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: '万年历', url: window.location.href });
            }
        }

        window.onload = () => {
            updateClock();
            handlePwaActions();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log("SW Registered"))
                    .catch(err => console.log("SW Failed:", err));
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Calendar V81</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --bg: #f5f3ef; --card: #ffffff; --red: #b71c1c; --f-red: #cf1322; --t-main: #111111; --t-sec: #888888; --line: #eeeeee; }
        [data-theme='dark'] { --bg: #121212; --card: #1e1e1e; --red: #ff5252; --f-red: #ff7875; --t-main: #e0e0e0; --t-sec: #aaaaaa; --line: #333333; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px 0; color: var(--t-main); margin: 0; }
        .card { background: var(--card); padding: 25px 20px 10px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 340px; text-align: center; border-top: 6px solid var(--red); box-sizing: border-box; position: relative; }
        .nav-btn { width: 34px; height: 34px; background: none; border: 1px solid var(--red); border-radius: 50%; color: var(--red); cursor: pointer; font-weight: bold; font-size: 0.8em; display: flex; align-items: center; justify-content: center; }
        .time { font-size: 2.4em; font-weight: bold; color: var(--red); margin: 5px 0; font-variant-numeric: tabular-nums; }
        .badge-label { display: inline-block; color: var(--f-red); padding: 2px 14px; border-radius: 50px; font-size: 0.85em; margin: 10px 0; background: #fff1f0; border: 1px solid #ffa39e; font-weight: bold; min-width: 60px; }
        .countdown-wrap { margin: 15px 0; padding: 10px 0; border-top: 1px dashed var(--line); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 55px; font-size: 0.95em; }
        .fest-content { flex: 1; line-height: 1.3; font-weight: bold; }
        .fest-nav { border: none; background: none; color: var(--red); cursor: pointer; font-size: 1.2em; padding: 0 8px; }
        .action-btn { flex: 1; background: var(--card); color: var(--red); border: 1px solid var(--line); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.9em; min-height: 55px; }
        .cal-wrap { display: none; background: var(--card); width: 340px; border-radius: 20px; padding: 15px 0; margin-top: 10px; border: 1px solid var(--line); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cal-wrap.show { display: block; }
        table { width: 95%; margin: 0 auto; border-collapse: collapse; }
        td { height: 52px; text-align: center; border-radius: 8px; font-size: 0.85em; position: relative; width: 14.28%; cursor: pointer; }
        
        /* Fixed selected day contrast */
        .cur-day { background: var(--red) !important; }
        .cur-day span, .cur-day small { color: #ffffff !important; font-weight: bold; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        
        .special-day { color: var(--f-red) !important; font-weight: bold; }
        #lunar-main { font-size: 2.5em; font-weight: bold; margin: 5px 0; line-height: 1.1; }
        #zodiac-year { font-size: 0.95em; font-weight: bold; color: var(--red); margin-bottom: 2px; }
        #en-lunar-sub { font-size: 1.2em; margin: 8px 0 2px 0; color: var(--red); font-weight: bold; }
        .rev-tag { font-size: 0.65em; color: var(--t-sec); margin-top: 15px; opacity: 0.6; }
    </style>
</head>
<body class="simp-mode" id="bodyRoot">

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <button class="nav-btn" onclick="toggleTheme()">🌙</button>
        <div id="solar-title" style="color:var(--t-sec); font-size: 0.85em;"></div>
        <button class="nav-btn" onclick="toggleLang()" id="langBtn">繁</button>
    </div>
    <div id="clock" class="time"></div>
    <div id="badge-lunar" class="badge-label"></div>
    <div id="en-lunar-sub"></div>
    <div id="lunar-main"></div>
    <div id="zodiac-year"></div>
    <div id="gz-d" style="color:var(--t-sec); font-size:0.8em; margin-bottom:10px;"></div>
    <div id="shi-info" style="background:var(--bg); padding:10px; border-radius:8px; font-size:0.9em; border:1px solid var(--line);"></div>
    
    <div class="countdown-wrap">
        <button id="fest-prev" class="fest-nav" onclick="navFest(-1)">❮</button>
        <div class="fest-content" id="fest-box"></div>
        <button id="fest-next" class="fest-nav" onclick="navFest(1)">❯</button>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="action-btn" onclick="toggleCal()" id="btn-cal"></button>
        <button class="action-btn" onclick="share()" id="btn-share"></button>
    </div>
    <div class="rev-tag">2026-05-15-v2</div>
</div>

<div class="cal-wrap" id="calWrapper">
    <div style="display:flex; justify-content:space-between; padding:0 20px 10px; align-items:center;">
        <button style="border:none; background:none; color:var(--red);" onclick="chgM(-1)">❮</button>
        <h4 id="cal-m-title" style="margin:0"></h4>
        <button style="border:none; background:none; color:var(--red);" onclick="chgM(1)">❯</button>
    </div>
    <table>
        <thead><tr id="cal-head" style="color:var(--t-sec); font-size:0.75em;"></tr></thead>
        <tbody id="cal-body"></tbody>
    </table>
</div>

<script>
const TRAD_MAP = { "惊蛰":"驚蟄", "芒种":"芒種", "处暑":"處暑", "节":"節", "时":"時", "礼拜":"禮拜", "离":"離", "还":"還", "历":"曆", "览":"覽", "农":"農", "马":"馬", "丑":"醜", "未":"未", "当前时辰":"當前時辰", "距离":"距離", "天":"天", "年":"年", "月":"月", "日":"日", "隐藏月历":"隱藏月曆", "月历":"月曆", "端午节":"端午節", "谷雨":"穀雨", "立夏":"立夏" };
const DATA = { 
    simp: { badge: "农历", cal: "月历", share: "分享", hide: "隐藏月历", shi: "当前时辰：", unit: "天", dist: "距离", weeks: ["日","一","二","三","四","五","六"], fNames: {"春节":"春节","端午节":"端午节","中秋节":"中秋节","清明":"清明","冬至":"冬至"}, wPre: "礼拜" },
    trad: { badge: "農曆", cal: "月曆", share: "分享", hide: "隱藏月曆", shi: "當前時辰：", unit: "天", dist: "距離", weeks: ["日","一","二","三","四","五","六"], fNames: {"春节":"春節","端午节":"端午節","中秋节":"中秋節","清明":"清明","冬至":"冬至"}, wPre: "禮拜" },
    en: { badge: "Lunar Calendar", cal: "Monthly Calendar", share: "Share", hide: "Hide Calendar", shi: "Current Time: ", unit: "Days to go", dist: "", weeks: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], fNames: {"春节":"Lunar New Year","端午节":"Dragon Boat Festival","中秋节":"Mid-Autumn Festival","清明":"Qingming Festival","冬至":"Winter Solstice"}, wPre: "" }
};

let lang = 'simp', viewD = new Date(), currentFIdx = 0, allF = [];

function fixTrad(str) { if (lang !== 'trad') return str; let s = str; for (let k in TRAD_MAP) s = s.split(k).join(TRAD_MAP[k]); return s; }

function update() {
    const now = new Date(), sol = Solar.fromDate(now), lun = sol.getLunar();
    const cfg = DATA[lang];
    document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    document.getElementById('btn-share').innerText = cfg.share;
    document.getElementById('btn-cal').innerText = document.getElementById('calWrapper').classList.contains('show') ? cfg.hide : cfg.cal;
    
    const jq = lun.getJieQi();
    document.getElementById('badge-lunar').innerText = jq ? fixTrad(jq) : cfg.badge;

    if(lang === 'en') {
        document.getElementById('en-lunar-sub').style.display = "block"; 
        document.getElementById('en-lunar-sub').innerText = `Lunar Month ${lun.getMonth()}, Day ${lun.getDay()}`;
        document.getElementById('lunar-main').style.fontSize = "1.2em";
        document.getElementById('lunar-main').style.color = "var(--t-sec)";
        document.getElementById('lunar-main').innerText = fixTrad(lun.getMonthInChinese() + "月" + lun.getDayInChinese());
        document.getElementById('zodiac-year').innerText = "Year of the Horse";
        document.getElementById('solar-title').innerText = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}, ${cfg.weeks[now.getDay()]}`;
    } else {
        document.getElementById('en-lunar-sub').style.display = "none";
        document.getElementById('lunar-main').style.fontSize = "2.5em";
        document.getElementById('lunar-main').style.color = "var(--t-main)";
        document.getElementById('lunar-main').innerText = fixTrad(lun.getMonthInChinese() + "月" + lun.getDayInChinese());
        document.getElementById('zodiac-year').innerText = fixTrad(lun.getYearInGanZhi() + lun.getYearShengXiao() + "年");
        document.getElementById('solar-title').innerText = fixTrad(`${sol.getYear()}年${sol.getMonth()}月${sol.getDay()}日 ${cfg.wPre}${cfg.weeks[now.getDay()]}`);
    }
    document.getElementById('gz-d').innerText = fixTrad(lun.getYearInGanZhi() + "年 " + lun.getMonthInGanZhi() + "月 " + lun.getDayInGanZhi() + "日");
    document.getElementById('shi-info').innerText = cfg.shi + fixTrad(lun.getEightChar().getTimeZhi()) + fixTrad("时");
    document.getElementById('langBtn').innerText = lang === 'simp' ? "繁" : (lang === 'trad' ? "En" : "简");
    refreshF(now);
}

function refreshF(now) {
    const today = new Date().setHours(0,0,0,0);
    if(allF.length === 0) {
        const defs = [{n:"春节",m:1,d:1,type:"l"},{n:"端午节",m:5,d:5,type:"l"},{n:"中秋节",m:8,d:15,type:"l"},{n:"清明",q:"清明",type:"j"},{n:"冬至",q:"冬至",type:"j"}];
        [now.getFullYear(), now.getFullYear()+1].forEach(y => { 
            defs.forEach(f => { 
                let sDate = (f.type==="l") ? (function(){ try{return Lunar.fromYmd(y,f.m,f.d).getSolar()}catch(e){}})() : Solar.fromDate(new Date(y,0,1)).getLunar().getJieQiTable()[f.q]; 
                if(sDate) { 
                    const d = new Date(sDate.getYear(), sDate.getMonth()-1, sDate.getDay()); 
                    if(d >= today) allF.push({raw:f.n, d:d}); 
                } 
            }); 
        });
        allF.sort((a,b)=>a.d-b.d);
    }
    const target = allF[currentFIdx];
    if(target) {
        const diff = Math.ceil((target.d - today)/86400000); 
        const name = DATA[lang].fNames[target.raw] || target.raw;
        const gDate = `(${target.d.getDate()}/${target.d.getMonth()+1})`;
        if(lang === 'en') {
            document.getElementById('fest-box').innerHTML = `<div style="color:var(--f-red)">${name} ${gDate}</div><div style="font-weight:normal; color:var(--t-sec); font-size:0.85em;">${diff} Days to go</div>`;
        } else {
            document.getElementById('fest-box').innerHTML = `<span style="color:var(--t-main)">${fixTrad(DATA[lang].dist + " " + name + " " + gDate)}</span> <span style="color:var(--red); font-size:1.1em">${diff}</span> ${fixTrad(DATA[lang].unit)}`;
        }
    }
}

function renderCal(date) {
    const y = date.getFullYear(), m = date.getMonth(), cfg = DATA[lang];
    document.getElementById('cal-m-title').innerText = fixTrad(`${y}年 ${m+1}月`);
    document.getElementById('cal-head').innerHTML = cfg.weeks.map(w => `<th>${w}</th>`).join('');
    const fDay = new Date(y, m, 1).getDay(), lDate = new Date(y, m+1, 0).getDate(), todayStr = Solar.fromYmd(new Date().getFullYear(), new Date().getMonth()+1, new Date().getDate()).toYmd();
    let html = '<tr>';
    for(let i=0; i<fDay; i++) html += '<td></td>';
    for(let d=1; d<=lDate; d++) {
        if((d+fDay-1)%7===0 && d!==1) html += '</tr><tr>';
        const sol = Solar.fromYmd(y, m+1, d), lun = sol.getLunar(), isToday = sol.toYmd() === todayStr ? "cur-day" : "";
        let lStr = lun.getJieQi() ? fixTrad(lun.getJieQi()) : (lun.getDay() === 1 ? fixTrad(lun.getMonthInChinese() + "月") : fixTrad(lun.getDayInChinese()));
        html += `<td class="${isToday}"><span>${d}</span><br><small>${lStr}</small></td>`;
    }
    document.getElementById('cal-body').innerHTML = html + '</tr>';
}

function toggleLang() { lang = (lang === 'simp') ? 'trad' : (lang === 'trad' ? 'en' : 'simp'); update(); renderCal(viewD); }
function toggleTheme() { document.documentElement.toggleAttribute('data-theme'); }
function toggleCal() { document.getElementById('calWrapper').classList.toggle('show'); update(); }
function chgM(n) { viewD.setMonth(viewD.getMonth()+n); renderCal(viewD); }
function navFest(n) { currentFIdx = Math.max(0, Math.min(allF.length-1, currentFIdx+n)); refreshF(new Date()); }
function share() { navigator.share ? navigator.share({title:'Lunar Calendar', url:location.href}) : alert(location.href); }
setInterval(update, 1000); update(); renderCal(viewD);

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>

<script data-goatcounter="https://ytlim-clock.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>

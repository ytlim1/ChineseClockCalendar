<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农历万年历</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --red: #b71c1c; --bg: #f6f6f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; padding: 20px; }

        .main-card { background: white; width: 100%; max-width: 360px; border-radius: 40px; border-top: 10px solid var(--red); box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 35px 25px; text-align: center; }
        .big-time { font-size: 4rem; font-weight: 700; color: var(--red); margin: 15px 0; font-variant-numeric: tabular-nums; }
        .lunar-m { font-size: 3.2rem; font-weight: 800; color: #111; margin: 0; }
        .btn-call { width: 100%; padding: 16px; border: 1px solid #eee; background: white; border-radius: 20px; font-size: 1.2rem; color: var(--red); cursor: pointer; margin-top: 20px; }

        /* 月历矩阵布局：还原 image_76264e */
        #calendar-area { display: none; width: 100%; max-width: 360px; background: white; margin-top: 15px; border-radius: 30px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 15px; color: #333; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-size: 0.8rem; color: #999; padding-bottom: 5px; }
        .day-cell { padding: 8px 0; border-radius: 10px; font-size: 0.9rem; position: relative; display: flex; flex-direction: column; align-items: center; }
        .day-cell b { font-size: 1rem; }
        .day-cell i { font-style: normal; font-size: 0.65rem; color: #999; }
        .day-cell.today { background: var(--red); color: white; }
        .day-cell.today i { color: #ffcdd2; }
    </style>
</head>
<body>

    <div class="main-card">
        <div style="color:#999;">2026年3月27日 礼拜五</div>
        <div class="big-time" id="clock">00:00:00</div>
        <div class="lunar-m">二月初九</div>
        <div style="color:var(--red); font-size:1.4rem;">丙午马年</div>
        <button class="btn-call" id="toggle-btn" onclick="toggleCalendar()">查看月历</button>
    </div>

    <div id="calendar-area">
        <div class="cal-header">
            <span style="color:var(--red); cursor:pointer;">&lt;</span>
            <span>2026 年 3 月</span>
            <span style="color:var(--red); cursor:pointer;">&gt;</span>
        </div>
        <div class="cal-grid" id="grid">
            <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
            <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
            </div>
    </div>

    <script>
        function toggleCalendar() {
            const area = document.getElementById('calendar-area');
            const btn = document.getElementById('toggle-btn');
            if (area.style.display === 'block') {
                area.style.display = 'none';
                btn.innerText = '查看月历';
            } else {
                renderGrid();
                area.style.display = 'block';
                btn.innerText = '隐藏月历';
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            // 保留周标题，清除旧日期
            const weekdays = grid.querySelectorAll('.weekday');
            grid.innerHTML = '';
            weekdays.forEach(w => grid.appendChild(w));

            const year = 2026, month = 3; 
            const firstDay = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();

            // 填充月初空白
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // 填充日期
            for (let d = 1; d <= daysInMonth; d++) {
                const l = Solar.fromYmd(year, month, d).getLunar();
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (d === 27 ? ' today' : '');
                
                // 农历逻辑：如果有节日显示节日，否则显示初几
                let lunarShow = l.getDayInChinese();
                if (l.getFestivals().length > 0) lunarShow = l.getFestivals()[0].substring(0,2);
                if (l.getJieQi()) lunarShow = l.getJieQi();

                cell.innerHTML = `<b>${d}</b><i>${lunarShow}</i>`;
                grid.appendChild(cell);
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }, 1000);
    </script>
</body>
</html>

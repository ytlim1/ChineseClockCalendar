<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農曆萬年曆 V33</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --bg: #f5f3ef; --card: #ffffff; --red: #b71c1c; --f-red: #cf1322; --t-main: #111111; --t-sec: #888888; --line: #eeeeee; }
        [data-theme='dark'] { --bg: #121212; --card: #1e1e1e; --red: #ff5252; --f-red: #ff7875; --t-main: #e0e0e0; --t-sec: #aaaaaa; --line: #333333; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px 0; color: var(--t-main); margin: 0; }
        .card { background: var(--card); padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 340px; text-align: center; border-top: 6px solid var(--red); box-sizing: border-box; }
        .nav-btn { width: 34px; height: 34px; background: none; border: 1px solid var(--red); border-radius: 50%; color: var(--red); cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .time { font-size: 2.8em; font-weight: bold; color: var(--red); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .lunar-big { font-size: 2.2em; font-weight: bold; margin: 10px 0; }
        .tag { display: inline-block; color: var(--f-red); padding: 2px 14px; border-radius: 50px; font-size: 0.9em; margin: 10px 0; background: #fff1f0; border: 1px solid #ffa39e; font-weight: bold; }
        
        /* 修正節慶對齊佈局 */
        .countdown-wrap { margin: 15px 0; padding: 15px 0; border-top: 1px dashed var(--line); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 50px; }
        .fest-content { flex: 1; font-size: 0.95em; line-height: 1.4; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 4px; }
        .fest-nav { border: none; background: none; color: var(--red); cursor: pointer; font-size: 1.2em; padding: 0 5px; transition: opacity 0.3s; }
        .fest-nav:disabled { opacity: 0.2; cursor: default; }

        .action-btn { flex: 1; background: var(--card); color: var(--red); border: 1px solid var(--line); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .cal-wrap { display: none; background: var(--card); width: 340px; border-radius: 20px; padding: 15px 0; margin-top: 10px; border: 1px solid var(--line); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cal-wrap.show { display: block; }
        table { width: 95%; margin: 0 auto; border-collapse: collapse; }
        td { height: 50px; text-align: center; border-radius: 8px; font-size: 0.9em; }
        .cur-day { background: var(--red) !important; color: #fff !important; }
        .is-f { color: var(--f-red) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <button class="nav-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <div id="solar-title" style="color:var(--t-sec);"></div>
        <button class="nav-btn" onclick="toggleLang()" id="langBtn">繁</button>
    </div>
    <div id="clock" class="time"></div>
    <div id="jieqi-tag" class="tag"></div>
    <div id="lunar-main" class="lunar-big"></div>
    <div id="gz-y" style="color:var(--red); font-weight:bold; font-size:1.1em;"></div>
    <div id="gz-d" style="color:var(--t-sec); font-size:0.85em; margin-bottom:10px;"></div>
    <div id="shi-info" style="background:var(--bg); padding:8px; border-radius:8px; font-size:0.95em; border:1px solid var(--line);"></div>
    
    <div class="countdown-wrap">
        <button class="fest-nav" id="festPrev" onclick="navFest(-1)">❮</button>
        <div class="fest-content" id="fest-box"></div>
        <button class="fest-nav" id="festNext" onclick="navFest(1)">❯</button>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="action-btn" onclick="toggleCal()">🗓️ <span id="btn-cal-txt"></span></button>
        <button class="action-btn" onclick="share()">📤 <span id="btn-share-txt"></span></button>
    </div>
</div>

<div class="cal-wrap" id="calWrapper">
    <div style="display:flex; justify-content:space-between; padding:0 20px 10px; align-items:center;">
        <button style="border:none; background:none; color:var(--red);" onclick="chgM(-1)">❮</button>
        <h4 id="cal-m-title" style="margin:0"></h4>
        <button style="border:none; background:none; color:var(--red);" onclick="chgM(1)">❯</button>
    </div>
    <table>
        <thead><tr id="cal-head" style="color:var(--t-sec); font-size:0.8em;"></tr></thead>
        <tbody id="cal-body"></tbody>
    </table>
</div>

<script>
let isTrad = false, viewD = new Date(), currentFIdx = 0, allF = [];

const TRAD = {"惊":"驚","蛰":"蟄","芒":"芒","种":"種","马":"馬","时":"時","礼":"禮","拜":"拜","历":"曆","节":"節","当":"當","离":"離","还":"還","有":"有","隐藏":"隱藏","月历":"月曆","分享":"分享","春节":"春節","端午":"端午","中秋":"中秋","距离":"距離","还有":"還有","今天是":"今天是","农历":"農曆","当前时辰":"當前時辰","天":"天","月":"月","年":"年","份":"份","星期":"禮拜"};
const SIMP = {"驚":"惊","蟄":"蛰","時":"时","禮":"礼","拜":"拜","曆":"历","節":"节","離":"离","還":"还","農":"农","馬":"马","距離":"距离","還有":"还有","月曆":"月历","當前時辰":"当前时辰","禮拜":"礼拜","農曆":"农历"};

function t(str) {
    if (!str) return "";
    let r = str;
    const dict = isTrad ? TRAD : SIMP;
    for (let k in dict) r = r.split(k).join(dict[k]);
    return r;
}

function update() {
    const now = new Date(), sol = Solar.fromDate(now), lun = sol.getLunar();
    document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    const weeks = ["日","一","二","三","四","五","六"];
    document.getElementById('solar-title').innerText = t(`${sol.getYear()}年${sol.getMonth()}月${sol.getDay()}日 禮拜${weeks[now.getDay()]}`);
    document.getElementById('lunar-main').innerText = t(`${lun.getMonthInChinese()}月${lun.getDayInChinese()}`);
    document.getElementById('gz-y').innerText = t(`${lun.getYearInGanZhi()}${lun.getYearShengXiao()}年`);
    document.getElementById('gz-d').innerText = t(`${lun.getYearInGanZhi()}年 ${lun.getMonthInGanZhi()}月 ${lun.getDayInGanZhi()}日`);
    document.getElementById('shi-info').innerText = t(`當前時辰：${lun.getEightChar().getTimeZhi()}時`);
    document.getElementById('jieqi-tag').innerText = t(lun.getJieQi() || "農曆");
    document.getElementById('btn-cal-txt').innerText = t(document.getElementById('calWrapper').classList.contains('show') ? "隱藏月曆" : "月曆");
    document.getElementById('btn-share-txt').innerText = t("分享");
    document.getElementById('langBtn').innerText = isTrad ? "簡" : "繁";
    refreshF(now);
}

function refreshF(now) {
    allF = [];
    const today = new Date().setHours(0,0,0,0);
    const defs = [{n:"春節",m:1,d:1,type:"l"},{n:"端午節",m:5,d:5,type:"l"},{n:"中秋節",m:8,d:15,type:"l"},{n:"清明",q:"清明",type:"j"},{n:"冬至",q:"冬至",type:"j"}];
    [now.getFullYear(), now.getFullYear()+1].forEach(y => {
        defs.forEach(f => {
            let sDate = (f.type==="l") ? (function(){ try{return Lunar.fromYmd(y,f.m,f.d).getSolar()}catch(e){}})() : Solar.fromDate(new Date(y,0,1)).getLunar().getJieQiTable()[f.q];
            if(sDate) {
                const d = new Date(sDate.getYear(), sDate.getMonth()-1, sDate.getDay());
                if(d >= today) allF.push({n:f.n, d:d, m:sDate.getMonth(), dy:sDate.getDay()});
            }
        });
    });
    allF.sort((a,b)=>a.d-b.d);
    
    // 更新箭頭狀態
    document.getElementById('festPrev').disabled = (currentFIdx <= 0);
    document.getElementById('festNext').disabled = (currentFIdx >= allF.length - 1);

    const target = allF[currentFIdx];
    if(target) {
        const diff = Math.ceil((target.d - today)/86400000);
        const l = { dist: t("距離"), have: t("還有"), day: t("天"), today: t("今天是") };
        document.getElementById('fest-box').innerHTML = diff === 0 
            ? `<span>${l.today}</span> <b style="color:var(--red)">${t(target.n)} (${target.dy}/${target.m})</b>` 
            : `<span>${l.dist}</span> <b style="white-space:nowrap;">${t(target.n)} (${target.dy}/${target.m})</b> <span>${l.have}</span> <span style="color:var(--red); font-size:1.4em; font-weight:bold;">${diff}</span> <span>${l.day}</span>`;
    }
}

function renderCal(date) {
    const y = date.getFullYear(), m = date.getMonth(), now = new Date();
    document.getElementById('cal-m-title').innerText = t(`${y}年 ${m+1}月份`);
    const weeks = ["日","一","二","三","四","五","六"];
    document.getElementById('cal-head').innerHTML = weeks.map(w => `<th>${t(w)}</th>`).join('');
    const fDay = new Date(y, m, 1).getDay(), lDate = new Date(y, m+1, 0).getDate();
    const jqs = Solar.fromDate(new Date(y, m, 1)).getLunar().getJieQiTable();
    let html = '<tr>';
    for(let i=0; i<fDay; i++) html += '<td></td>';
    for(let d=1; d<=lDate; d++) {
        if((d+fDay-1)%7===0 && d!==1) html += '</tr><tr>';
        const sol = Solar.fromYmd(y, m+1, d), lun = sol.getLunar(), lDayStr = lun.getDayInChinese();
        let fName = "";
        if(lun.getMonth()===1 && lun.getDay()===1) fName = "春節";
        if(lun.getMonth()===5 && lun.getDay()===5) fName = "端午節";
        if(lun.getMonth()===8 && lun.getDay()===15) fName = "中秋節";
        for(let k in jqs) { if(jqs[k].getYear()===y && jqs[k].getMonth()===(m+1) && jqs[k].getDay()===d) { fName = k; break; } }
        const isToday = (d===now.getDate() && m===now.getMonth() && y===now.getFullYear()) ? "cur-day" : "";
        const disp = t(fName || (lDayStr === "初一" ? lun.getMonthInChinese() + "月" : lDayStr));
        html += `<td class="${isToday}"><span style="font-weight:bold">${d}</span><br><small class="${(fName || lDayStr === "初一") ? "is-f" : ""}" style="font-size:0.75em">${disp}</small></td>`;
    }
    document.getElementById('cal-body').innerHTML = html + '</tr>';
}

function toggleLang() { isTrad = !isTrad; update(); renderCal(viewD); }
function toggleTheme() { const d = document.documentElement; d.getAttribute('data-theme')==='dark' ? d.removeAttribute('data-theme') : d.setAttribute('data-theme','dark'); }
function toggleCal() { document.getElementById('calWrapper').classList.toggle('show'); update(); }
function chgM(n) { viewD.setMonth(viewD.getMonth()+n); renderCal(viewD); }
function navFest(n) { currentFIdx = Math.max(0, Math.min(allF.length-1, currentFIdx+n)); update(); }
function share() { navigator.share ? navigator.share({title:t('農曆'), url:location.href}) : alert(location.href); }

setInterval(update, 1000); update(); renderCal(viewD);
</script>
</body>
</html>

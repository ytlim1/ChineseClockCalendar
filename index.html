<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农历万年历 - 离线增强版</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --main-red: #b71c1c; --bg-gray: #f5f3ef; --fest-red: #cf1322; }
        body { background-color: var(--bg-gray); font-family: "Microsoft YaHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 0; color: #333; }
        
        .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 350px; text-align: center; border-top: 6px solid var(--main-red); margin-bottom: 20px; }
        .time { font-size: 2.5em; font-weight: bold; color: var(--main-red); margin: 10px 0; letter-spacing: 2px; }
        .jieqi-tag { display: inline-block; background: #fff1f0; color: var(--fest-red); padding: 4px 12px; border-radius: 50px; font-size: 0.9em; margin-bottom: 15px; border: 1px solid #ffa39e; }
        .lunar-main { font-size: 2.4em; font-weight: bold; margin: 5px 0; color: #1a1a1a; }
        .shichen-box { margin: 10px 0; background: #f9f9f9; padding: 8px; border-radius: 8px; color:#666; font-size: 0.95em; }
        
        /* 倒计时区 */
        .countdown { margin: 20px 0; padding-top: 15px; border-top: 1px dashed #ddd; color: #777; min-height: 80px; }
        .days { color: var(--main-red); font-size: 1.8em; font-weight: bold; margin: 0 5px; }
        
        /* 月历开关按钮 */
        .cal-btn { background: var(--main-red); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 0.9em; font-weight: bold; width: 100%; margin-top: 10px; }

        /* 月历容器：改为 display 切换，解决无法打开的问题 */
        .calendar-wrapper { display: none; background: #fff; width: 350px; border-radius: 20px; padding: 20px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .calendar-wrapper.show { display: block; }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 0 auto 15px; }
        .nav-btn { background: none; border: none; color: var(--main-red); font-size: 1.4em; cursor: pointer; padding: 0 15px; font-weight: bold; }
        
        table { width: 90%; margin: 0 auto; border-collapse: collapse; }
        th { color: var(--main-red); padding-bottom: 10px; font-size: 0.8em; }
        td { height: 55px; text-align: center; border-radius: 8px; vertical-align: middle; border: 1px solid #fafafa; }
        .cur-day { background: var(--main-red) !important; color: #fff !important; }
        .is-fest { color: var(--fest-red) !important; font-weight: bold !important; }
        .cur-day .is-fest { color: #fff !important; }
    </style>
</head>
<body>

<div class="card">
    <div id="solar-date" style="color:#888; font-size:1.1em;">---</div>
    <div id="clock" class="time">00:00:00</div>
    <div id="jieqi-tag" class="jieqi-tag">今日节气：--</div>
    <div id="lunar-main" class="lunar-main">---</div>
    <div id="gz-year" style="color:var(--main-red); font-weight:bold; font-size:1.2em;">---</div>
    <div id="shichen-info" class="shichen-box">---</div>

    <div class="countdown">
        距离 <span id="fest-name" style="font-weight:bold; color:#333">---</span> 还有
        <div style="margin-top:8px;"><span id="fest-days" class="days">0</span> 天</div>
    </div>

    <button class="cal-btn" onclick="toggleCalendar()">查看 / 隐藏月历</button>
</div>

<div class="calendar-wrapper" id="calWrapper">
    <div class="cal-header">
        <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
        <h4 id="cal-title" style="margin: 0; color: #333;">---</h4>
        <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
    </div>
    <table>
        <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
        <tbody id="calendar-body"></tbody>
    </table>
</div>

<script>
let viewDate = new Date(); 

function toggleCalendar() {
    const wrapper = document.getElementById('calWrapper');
    wrapper.classList.toggle('show');
    renderCalendar(viewDate);
}

function changeMonth(delta) {
    viewDate.setMonth(viewDate.getMonth() + delta);
    renderCalendar(viewDate);
}

function update() {
    const now = new Date();
    const solar = Solar.fromDate(now);
    const lunar = solar.getLunar();

    document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    document.getElementById('solar-date').innerText = `${solar.getYear()}年${solar.getMonth()}月${solar.getDay()}日 礼拜${solar.getWeekInChinese()}`;
    document.getElementById('lunar-main').innerText = `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
    document.getElementById('gz-year').innerText = `${lunar.getYearInGanZhi()}${lunar.getYearShengXiao()}年`;

    const jq = lunar.getJieQi() || lunar.getPrevJieQi().getName();
    document.getElementById('jieqi-tag').innerText = `今日节气：${jq}`;

    const sc = lunar.getEightChar().getTimeZhi();
    document.getElementById('shichen-info').innerText = `当前时辰：${sc}时`;

    // 节日与阳历日期 (DD/MM)
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let targets = [];
    const festConfigs = [
        { n: "春节", t: "l", m: 1, d: 1 },
        { n: "端午节", t: "l", m: 5, d: 5 },
        { n: "中秋节", t: "l", m: 8, d: 15 },
        { n: "清明节", t: "j", q: "清明" },
        { n: "冬至", t: "j", q: "冬至" }
    ];

    [now.getFullYear(), now.getFullYear() + 1].forEach(y => {
        festConfigs.forEach(f => {
            let sDate;
            if (f.t === "l") {
                try { sDate = Lunar.fromYmd(y, f.m, f.d).getSolar(); } catch(e) {}
            } else {
                sDate = Solar.fromDate(new Date(y, 0, 1)).getLunar().getJieQiTable()[f.q];
            }
            if(sDate) {
                const d = new Date(sDate.getYear(), sDate.getMonth() - 1, sDate.getDay());
                if (d >= today) {
                    const dateTag = ` (${sDate.getDay()}/${sDate.getMonth()})`;
                    targets.push({ name: f.n + dateTag, date: d });
                }
            }
        });
    });

    targets.sort((a, b) => a.date - b.date);
    if (targets[0]) {
        const diff = Math.ceil((targets[0].date - today) / 86400000);
        document.getElementById('fest-name').innerText = targets[0].name;
        document.getElementById('fest-days').innerText = diff;
    }
}

function renderCalendar(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    const now = new Date();
    document.getElementById('cal-title').innerText = `${year}年 ${month + 1}月`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    
    let html = '<tr>';
    for (let i = 0; i < firstDay; i++) html += '<td></td>';
    for (let d = 1; d <= lastDate; d++) {
        if ((d + firstDay - 1) % 7 === 0 && d !== 1) html += '</tr><tr>';
        const sDate = Solar.fromYmd(year, month + 1, d);
        const lDate = sDate.getLunar();
        const jq = lDate.getJieQi(); 
        
        const isToday = (d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) ? "cur-day" : "";
        const isFest = (jq === "冬至" || jq === "清明" || lDate.getDayInChinese() === "初一") ? "is-fest" : "";
        
        html += `<td class="${isToday}"><span style="font-size:1.1em">${d}</span><br><small class="${isFest}">${jq || lDate.getDayInChinese()}</small></td>`;
    }
    document.getElementById('calendar-body').innerHTML = html + '</tr>';
}

setInterval(update, 1000);
update();
renderCalendar(viewDate); // 初始生成

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>

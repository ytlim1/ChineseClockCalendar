<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万年历 Lunar Clock</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b71c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg-color: #f5f3ef;
            --text-color: #333;
            --accent-color: #b71c1c;
            --modal-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* 防止移动端意外滚动 */
        }

        /* 时钟主显示区 */
        #clock-container {
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .time {
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 800;
            color: var(--accent-color);
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.2em;
        }

        .lunar-info {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #5d5d5d;
            margin-bottom: 1.5em;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            background: var(--accent-color);
            color: white;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(183, 28, 28, 0.2);
            transition: transform 0.1s, background 0.2s;
        }

        button:active { transform: scale(0.95); background: #8e1616; }

        /* 弹窗系统 */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--modal-bg);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1001;
            text-align: center;
        }

        .modal h2 { margin-top: 0; color: var(--accent-color); }
        .modal-body { font-size: 1.1rem; line-height: 1.6; margin: 20px 0; color: #444; }

        .close-btn {
            background: #e0e0e0;
            color: #333;
            box-shadow: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="clock-container">
        <div class="time" id="time-display">00:00:00</div>
        <div class="lunar-info" id="lunar-display">正在计算农历...</div>
        
        <div class="btn-group">
            <button onclick="showTodayDetail()">今日详情</button>
            <button onclick="shareApp()">一键分享</button>
        </div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal" class="modal">
        <h2 id="modal-title">详情</h2>
        <div id="modal-body" class="modal-body"></div>
        <button class="close-btn" onclick="closeModal()">返回大时钟</button>
    </div>

    <script>
        // --- 1. 核心数据与字典 ---
        // (请在此处保留您完整的农历转换算法和简繁字典逻辑)
        const dictionary = { "时": "時", "马": "馬", "龙": "龍" }; 

        function getLunarText(date) {
            // 模拟您的算法输出
            return "丙午年 二月初九"; 
        }

        // --- 2. 时钟更新逻辑 ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('time-display').textContent = timeStr;
            document.getElementById('lunar-display').textContent = getLunarText(now);
        }
        setInterval(updateClock, 1000);

        // --- 3. 弹窗与 URL 处理逻辑 ---
        function openModal(title, content) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';

            // 核心修复：清理 URL 参数，让用户回到真正的 index.html
            if (window.history.replaceState) {
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
            }
        }

        function showTodayDetail() {
            const detail = "<b>农历：</b>二月初九<br><b>干支：</b>丙午年 辛卯月 戊子日<br><b>宜：</b>祭祀、入宅、捕捉<br><b>忌：</b>开张、动土";
            openModal("🗓️ 今日详情", detail);
        }

        function showCountdown() {
            const list = "离 <b>清明节</b> 还有 9 天<br>离 <b>端午节</b> 还有 65 天";
            openModal("🏮 节日倒计时", list);
        }

        // --- 4. 快捷方式入口检测 ---
        function handlePwaActions() {
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');

            if (action === 'today') {
                showTodayDetail();
            } else if (action === 'countdown') {
                showCountdown();
            }
        }

        // --- 5. 分享逻辑 ---
        async function shareApp() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '万年历 Lunar Clock',
                        text: '分享这个实用的农历时钟给你！',
                        url: 'https://ytlim1.github.io/ChineseClockCalendar/'
                    });
                } catch (err) { console.log("分享取消或失败"); }
            } else {
                alert("请复制浏览器地址栏链接进行分享");
            }
        }

        // --- 6. 初始化 ---
        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            handlePwaActions(); // 关键：检测是否从快捷方式进入

            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW 注册成功'))
                    .catch(err => console.error('SW 注册失败', err));
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農曆萬年曆 V16</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --bg-gray: #f5f3ef; --card-bg: #ffffff; --main-red: #b71c1c; --fest-red: #cf1322; --text-main: #111111; --text-sec: #888888; --line-color: #eeeeee; --btn-bg: #fff1f0; --btn-border: #ffa39e; }
        [data-theme='dark'] { --bg-gray: #121212; --card-bg: #1e1e1e; --main-red: #ff5252; --fest-red: #ff7875; --text-main: #e0e0e0; --text-sec: #aaaaaa; --line-color: #333333; --btn-bg: #2a1215; --btn-border: #5c2223; }
        
        body { background-color: var(--bg-gray); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px 0; color: var(--text-main); margin: 0; }
        .card { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 340px; text-align: center; border-top: 6px solid var(--main-red); box-sizing: border-box; }
        
        .nav-circle { width: 34px; height: 34px; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 50%; color: var(--fest-red); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .time { font-size: 2.8em; font-weight: bold; color: var(--main-red); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .jieqi-tag { display: inline-block; color: var(--fest-red); padding: 2px 14px; border-radius: 50px; font-size: 0.9em; margin: 10px 0; background: var(--btn-bg); border: 1px solid var(--btn-border); font-weight: bold; min-height: 24px; }
        
        .countdown { margin: 15px 0; padding: 15px 0; border-top: 1px dashed var(--line-color); display: flex; align-items: center; justify-content: space-between; }
        .fest-text-box { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; min-height: 40px; font-size: 1.05em; }
        .days { color: var(--main-red); font-size: 1.6em; font-weight: bold; }
        
        .arrow-btn { background: none; border: none; font-size: 1.5em; color: var(--main-red); cursor: pointer; width: 40px; display: flex; align-items: center; justify-content: center; }
        .arrow-btn:disabled { color: #ccc !important; cursor: not-allowed; }

        .action-btn { flex: 1; background: var(--card-bg); color: var(--main-red); border: 1px solid var(--line-color); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .calendar-wrapper { display: none; background: var(--card-bg); width: 340px; border-radius: 20px; padding: 15px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin-top: 10px; border: 1px solid var(--line-color); }
        .calendar-wrapper.show { display: block; }
        table { width: 95%; margin: 0 auto; border-collapse: collapse; }
        td { height: 55px; text-align: center; border-radius: 8px; font-size: 0.92em; line-height: 1.3; }
        .cur-day { background: var(--main-red) !important; color: #fff !important; }
        .is-fest { color: var(--fest-red) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <button class="nav-circle" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <div id="solar-date" style="color:var(--text-sec); font-size:1.05em">---</div>
        <button class="nav-circle" onclick="toggleLang()" id="langBtn">繁</button>
    </div>
    <div id="clock" class="time">00:00:00</div>
    <div id="jieqi-tag" class="jieqi-tag"></div>
    <div id="lunar-main" class="lunar-main">---</div>
    <div id="gz-year" style="color:var(--main-red); font-weight:bold; font-size:1.1em;">---</div>
    <div id="gz-detail" style="color: var(--text-sec); font-size: 0.85em; margin-bottom: 10px;">---</div>
    <div id="shichen-info" style="background:var(--bg-gray); padding:8px; border-radius:8px; font-size:0.95em; border:1px solid var(--line-color);">---</div>
    
    <div class="countdown">
        <button class="arrow-btn" id="prevFest" onclick="navFest(-1)">❮</button>
        <div id="fest-content" class="fest-text-box"></div>
        <button class="arrow-btn" id="nextFest" onclick="navFest(1)">❯</button>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="action-btn" onclick="toggleCalendar()">🗓️ <span id="btn-text">月曆</span></button>
        <button class="action-btn" onclick="shareApp()">📤 <span id="share-text">分享</span></button>
    </div>
</div>

<div class="calendar-wrapper" id="calWrapper">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:0 20px 10px;">
        <button class="arrow-btn" onclick="changeMonth(-1)">❮</button>
        <h4 id="cal-title" style="margin:0">---</h4>
        <button class="arrow-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <table>
        <thead><tr style="color:var(--text-sec); font-size:0.85em;"><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
        <tbody id="calendar-body"></tbody>
    </table>
</div>

<script>
let viewDate = new Date(), isTrad = false, allFests = [], currentFestIdx = 0;
const JIE_QI_LIST = ["立春","雨水","驚蟄","春分","清明","穀雨","立夏","小滿","芒種","夏至","小暑","大暑","立秋","處暑","白露","秋分","寒露","霜降","立冬","小雪","大雪","冬至","小寒","大寒"];

// 強制繁簡映射函數
function t2s(text) {
    if (isTrad) return text;
    const map = {
        '時': '时', '禮': '礼', '農': '农', '曆': '历', '節': '节', '當': '当', '前': '前', 
        '辰': '辰', '離': '离', '還': '还', '馬': '马', '龍': '龙', '雞': '鸡', '豬': '猪',
        '月曆': '月历', '隱藏': '隐藏', '距離': '距离', '今天是': '今天是'
    };
    let result = text;
    for (let key in map) result = result.split(key).join(map[key]);
    return result;
}

function update() {
    const now = new Date(), solar = Solar.fromDate(now), lunar = solar.getLunar();
    document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    
    // 1. 頂部日期與時辰 - 強制處理「時」字
    const weekLabel = isTrad ? "禮拜" : "礼拜";
    document.getElementById('solar-date').innerText = `${solar.getYear()}年${solar.getMonth()}月${solar.getDay()}日 ${weekLabel}${solar.getWeekInChinese()}`;
    
    document.getElementById('lunar-main').innerText = `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
    document.getElementById('gz-year').innerText = `${lunar.getYearInGanZhi()}${t2s(lunar.getYearShengXiao())}年`;
    document.getElementById('gz-detail').innerText = `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInGanZhi()}月 ${lunar.getDayInGanZhi()}日`;
    
    const shichenBase = isTrad ? "當前時辰" : "当前时辰";
    document.getElementById('shichen-info').innerText = `${shichenBase}：${lunar.getEightChar().getTimeZhi()}${isTrad ? '時' : '时'}`;
    
    document.getElementById('jieqi-tag').innerText = lunar.getJieQi() || (isTrad ? "農曆" : "农历");

    const isShow = document.getElementById('calWrapper').classList.contains('show');
    document.getElementById('btn-text').innerText = isTrad ? (isShow ? "隱藏月曆" : "月曆") : (isShow ? "隐藏月历" : "月历");
    document.getElementById('share-text').innerText = isTrad ? "分享" : "分享";

    refreshFests(now);
}

function refreshFests(now) {
    allFests = [];
    const today = new Date().setHours(0,0,0,0);
    const fNames = isTrad ? ["春節","端午節","中秋節","清明節","冬至"] : ["春节","端午节","中秋节","清明节","冬至"];
    const fDefs = [{n:fNames[0],m:1,d:1,t:"l"},{n:fNames[1],m:5,d:5,t:"l"},{n:fNames[2],m:8,d:15,t:"l"},{n:fNames[3],q:"清明",t:"j"},{n:fNames[4],q:"冬至",t:"j"}];
    
    [now.getFullYear(), now.getFullYear()+1].forEach(y => {
        fDefs.forEach(f => {
            let sd = (f.t==="l") ? (function(){try{return Lunar.fromYmd(y,f.m,f.d).getSolar()}catch(e){}})() : Solar.fromDate(new Date(y,0,1)).getLunar().getJieQiTable()[f.q];
            if(sd){
                const d = new Date(sd.getYear(), sd.getMonth()-1, sd.getDay());
                if(d >= today) allFests.push({n:f.n, d:d, m:sd.getMonth(), dy:sd.getDay()});
            }
        });
    });
    allFests.sort((a,b)=>a.d-b.d);

    document.getElementById('prevFest').disabled = (currentFestIdx <= 0);
    document.getElementById('nextFest').disabled = (currentFestIdx >= allFests.length - 1);

    const target = allFests[currentFestIdx];
    if(target) {
        const diff = Math.ceil((target.d - today)/86400000);
        const labels = isTrad ? ["距離","還有","天","今天是"] : ["距离","还有","天","今天是"];
        document.getElementById('fest-content').innerHTML = diff === 0 
            ? `<span>${labels[3]}</span> <b style="color:var(--main-red)">${target.n} (${target.dy}/${target.m})</b>` 
            : `<span>${labels[0]}</span> <b>${target.n} (${target.dy}/${target.m})</b> <span>${labels[1]}</span> <span class="days">${diff}</span> <span>${labels[2]}</span>`;
    }
}

function renderCalendar(date) {
    const y = date.getFullYear(), m = date.getMonth(), now = new Date();
    document.getElementById('cal-title').innerText = `${y}年 ${m+1}月`;
    const fDay = new Date(y, m, 1).getDay(), lDate = new Date(y, m+1, 0).getDate();
    
    let html = '<tr>';
    for(let i=0; i<fDay; i++) html += '<td></td>';
    for(let d=1; d<=lDate; d++) {
        if((d+fDay-1)%7===0 && d!==1) html += '</tr><tr>';
        const lun = Solar.fromYmd(y, m+1, d).getLunar();
        const jq = lun.getJieQi(), lDayStr = lun.getDayInChinese();
        
        let festName = "";
        if(lun.getMonth()===1 && lun.getDay()===1) festName = isTrad ? "春節" : "春节";
        if(lun.getMonth()===5 && lun.getDay()===5) festName = isTrad ? "端午" : "端午";
        if(lun.getMonth()===8 && lun.getDay()===15) festName = isTrad ? "中秋" : "中秋";

        const display = festName || (lDayStr === "初一" ? lun.getMonthInChinese() + "月" : lDayStr);
        const isToday = (d===now.getDate() && m===now.getMonth() && y===now.getFullYear()) ? "cur-day" : "";
        
        // 🚨 終極校準：只有精確匹配白名單、節日或「初一」才紅。排除「十八」等干擾。
        const isF = ( (jq && JIE_QI_LIST.includes(jq)) || festName || lDayStr === "初一" ) ? "is-fest" : "";
        
        html += `<td class="${isToday}"><span style="font-weight:bold">${d}</span><br><small class="${isF}" style="font-size:0.75em">${t2s(display)}</small></td>`;
    }
    document.getElementById('calendar-body').innerHTML = html + '</tr>';
}

function toggleLang() { isTrad = !isTrad; document.getElementById('langBtn').innerText = isTrad ? "簡" : "繁"; update(); renderCalendar(viewDate); }
function toggleTheme() { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',t); document.getElementById('themeBtn').innerText = t==='dark'?"☀️":"🌙"; }
function toggleCalendar() { document.getElementById('calWrapper').classList.toggle('show'); update(); }
function changeMonth(n) { viewDate.setMonth(viewDate.getMonth()+n); renderCalendar(viewDate); }
function navFest(n) { currentFestIdx = Math.max(0, Math.min(allFests.length-1, currentFestIdx+n)); update(); }
function shareApp() { navigator.share ? navigator.share({title:'農曆', url:location.href}) : alert(location.href); }

setInterval(update, 1000); update(); renderCalendar(viewDate);
</script>
</body>
</html>

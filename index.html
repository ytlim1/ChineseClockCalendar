<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万年历 Lunar Clock</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b71c1c">
    
    <style>
        :root {
            --primary-red: #b71c1c;
            --bg-gray: #f8f8f8;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 您截图中的精致卡片设计 */
        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 380px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            border-top: 8px solid var(--primary-red);
        }

        .date-row { color: #999; font-size: 1.2rem; margin-bottom: 10px; }
        .trad-toggle { 
            position: absolute; top: 35px; right: 25px;
            padding: 4px 10px; border: 1px solid #ffcdd2;
            color: var(--primary-red); border-radius: 8px; font-size: 0.8rem;
        }

        .time {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--primary-red);
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .solar-term {
            display: inline-block;
            padding: 5px 20px;
            border: 1px solid #ffcdd2;
            color: var(--primary-red);
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .lunar-main { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .gan-zhi { color: var(--primary-red); font-size: 1.4rem; margin-bottom: 25px; }

        .info-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .countdown-row {
            border-top: 1px dashed #eee;
            padding-top: 25px;
            font-size: 1.1rem;
            color: #444;
        }
        .countdown-num { color: var(--primary-red); font-size: 1.8rem; font-weight: bold; }

        .action-btn {
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            border: 1px solid #eee;
            background: white;
            border-radius: 15px;
            font-size: 1.2rem;
            color: var(--primary-red);
            cursor: pointer;
        }

        /* 右下角悬浮分享按钮 */
        .fab-share {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: var(--primary-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(183, 28, 28, 0.4);
            cursor: pointer;
        }

        /* 隐藏的弹窗遮罩 */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="trad-toggle" onclick="toggleTrad()">轉繁</div>
        <div class="date-row" id="date-str">2026年3月27日 礼拜五</div>
        <div class="time" id="clock">10:55:00</div>
        <div class="solar-term">今日节气：春分</div>
        <div class="lunar-main" id="lunar-str">二月初九</div>
        <div class="gan-zhi">丙午马年</div>
        
        <div class="info-box">当前时辰：巳时</div>
        
        <div class="countdown-row">
            距离 <b>清明节 (5/4)</b> 还有 <span class="countdown-num">9</span> 天
        </div>

        <button class="action-btn" onclick="showCalendar()">查看月历</button>
    </div>

    <div class="fab-share" onclick="shareApp()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/>
        </svg>
    </div>

    <div id="overlay" onclick="closeModal()"></div>

    <script>
        // 1. 核心简繁体字典
        const dict = { "时": "時", "马": "馬", "礼拜": "禮拜", "节气": "節氣" };
        let isTrad = false;

        function toggleTrad() {
            isTrad = !isTrad;
            document.querySelector('.trad-toggle').innerText = isTrad ? "简中" : "轉繁";
            updateClock();
        }

        // 2. 实时更新逻辑
        function updateClock() {
            const now = new Date();
            let timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            let dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 礼拜五`;
            
            // 这里应该调用您原本的农历转换函数
            let lunarStr = "二月初九"; 

            document.getElementById('clock').innerText = timeStr;
            document.getElementById('date-str').innerText = dateStr;
            document.getElementById('lunar-str').innerText = lunarStr;
        }
        setInterval(updateClock, 1000);

        // 3. 核心修复：处理 PWA 快捷方式并清理 URL
        function handlePwaActions() {
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');

            if (action === 'today') {
                showCalendar(); // 自动触发月历/详情
            }

            // 关键：清理 URL 尾巴，让用户可以“返回”到干净的主界面
            if (window.history.replaceState && action) {
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
            }
        }

        function showCalendar() {
            alert("正在调用您的月历视图...");
            // 如果您有遮罩层，在这里显示它
            // document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
        }

        async function shareApp() {
            if (navigator.share) {
                await navigator.share({
                    title: '我的万年历',
                    url: window.location.href
                });
            }
        }

        window.onload = () => {
            updateClock();
            handlePwaActions(); // 启动时检测参数
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农历万年历</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b71c1c">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --primary: #b71c1c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background-color: #f6f6f6;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: -apple-system, sans-serif;
            overflow: hidden; /* 防止页面上下滚动 */
        }

        /* 修复 UI 过大：加入 max-height 和 padding 控制 */
        .card {
            background: white; width: 90%; max-width: 360px;
            max-height: 85vh; /* 限制高度，防止贴边 */
            border-radius: 40px; border-top: 10px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 35px 25px; text-align: center;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .top-info { color: #999; font-size: 1.1rem; margin-bottom: 5px; }
        .clock-num { font-size: 4.2rem; font-weight: 700; color: var(--primary); margin: 5px 0; font-variant-numeric: tabular-nums; }
        .term-tag { display: inline-block; padding: 4px 18px; border: 1px solid #ffcdd2; color: var(--primary); border-radius: 20px; font-size: 1rem; align-self: center; }
        .lunar-main { font-size: 3.5rem; font-weight: 800; margin: 5px 0; color: #1a1a1a; }
        .lunar-year { color: var(--primary); font-size: 1.5rem; margin-bottom: 15px; }
        .slot-box { background: #f9f9f9; padding: 12px; border-radius: 15px; color: #777; font-size: 1.2rem; border: 1px solid #f0f0f0; }
        .cd-row { border-top: 1px dashed #eee; padding-top: 15px; color: #555; font-size: 1.1rem; margin-top: 10px; }
        .cd-bold { color: var(--primary); font-size: 2rem; font-weight: bold; }

        .btn-open {
            width: 100%; padding: 16px; margin-top: 15px;
            border: 1px solid #eee; background: white;
            border-radius: 20px; font-size: 1.25rem;
            color: var(--primary); cursor: pointer;
            z-index: 10; /* 确保在最上层 */
        }

        /* 弹窗样式 */
        #mask { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:100; backdrop-filter:blur(4px); }
        #pop-win { display: none; position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:101; background:white; width:85%; max-width:320px; border-radius:30px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-info" id="d-val">2026年3月27日 礼拜五</div>
        <div class="clock-num" id="t-val">11:36:37</div>
        <div class="term-tag">今日节气：春分</div>
        <div class="lunar-main" id="l-val">二月初九</div>
        <div class="lunar-year" id="g-val">丙午马年</div>
        <div class="slot-box" id="s-val">当前时辰：午时</div>
        <div class="cd-row">距离 <b>清明节 (5/4)</b> 还有 <span class="cd-bold" id="c-val">9</span> 天</div>
        <button class="btn-open" onclick="openPopup()">查看月历</button>
    </div>

    <div id="mask" onclick="closePopup()"></div>
    <div id="pop-win">
        <h3 style="color:var(--primary); margin-top:0;">今日详情</h3>
        <div id="pop-body" style="text-align:left; line-height:1.8; margin-bottom:20px;"></div>
        <button class="btn-open" onclick="closePopup()">返回</button>
    </div>

    <script>
        function update() {
            const now = new Date();
            const lunar = Lunar.fromDate(now);
            document.getElementById('t-val').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            
            const target = new Date(2026, 3, 5); 
            const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            document.getElementById('c-val').innerText = diff > 0 ? diff : 0;
        }

        function openPopup() {
            const l = Lunar.fromDate(new Date());
            document.getElementById('pop-body').innerHTML = `<b>干支：</b>${l.getYearInGanZhi()}年<br><b>宜：</b>${l.getYi().slice(0,3).join(' ')}<br><b>忌：</b>${l.getJi().slice(0,3).join(' ')}`;
            document.getElementById('mask').style.display = 'block';
            document.getElementById('pop-win').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('mask').style.display = 'none';
            document.getElementById('pop-win').style.display = 'none';
        }

        setInterval(update, 1000);
        update();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=7');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农历万年历</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --red: #b71c1c; --bg: #f6f6f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; font-family: -apple-system, sans-serif;
            padding: 20px;
        }

        /* 还原 25 日截图的高级感卡片比例 */
        .main-card {
            background: white; width: 100%; max-width: 360px;
            border-radius: 40px; border-top: 10px solid var(--red);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 35px 25px; text-align: center;
            display: flex; flex-direction: column; gap: 15px;
            transition: all 0.3s ease;
        }

        .top-txt { color: #999; font-size: 1rem; display: flex; justify-content: center; gap: 8px; }
        .btn-t { padding: 2px 8px; border: 1px solid #ffcdd2; color: var(--red); border-radius: 6px; font-size: 0.8rem; }
        
        .big-time { font-size: 4rem; font-weight: 700; color: var(--red); margin: 5px 0; font-variant-numeric: tabular-nums; }
        .tag-term { display: inline-block; padding: 4px 15px; border: 1px solid #ffcdd2; color: var(--red); border-radius: 20px; font-size: 0.9rem; align-self: center; }
        
        .lunar-m { font-size: 3.2rem; font-weight: 800; color: #111; margin: 0; }
        .lunar-y { color: var(--red); font-size: 1.4rem; margin-top: 2px; }
        
        .slot-ui { background: #f9f9f9; padding: 12px; border-radius: 15px; color: #777; font-size: 1.1rem; border: 1px solid #f0f0f0; }
        .cd-ui { border-top: 1px dashed #eee; padding-top: 15px; color: #555; font-size: 1rem; }
        .cd-n { color: var(--red); font-size: 2rem; font-weight: bold; }

        .btn-call {
            width: 100%; padding: 16px; border: 1px solid #eee; 
            background: white; border-radius: 20px; font-size: 1.2rem;
            color: var(--red); cursor: pointer; margin-top: 10px;
        }

        /* 下方嵌入式详情区：还原 image_76264e 的风格 */
        #calendar-area {
            display: none; width: 100%; max-width: 360px;
            background: white; margin-top: 15px; border-radius: 30px;
            padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .detail-item { line-height: 2.2; color: #333; font-size: 1.05rem; text-align: left; }
        .detail-item b { color: var(--red); margin-right: 5px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="top-txt">
            <span id="cur-date">2026年3月27日 礼拜五</span>
            <span class="btn-t">轉繁</span>
        </div>
        <div class="big-time" id="cur-time">00:00:00</div>
        <div class="tag-term">今日节气：春分</div>
        <div>
            <div class="lunar-m" id="l-m">二月初九</div>
            <div class="lunar-y" id="l-y">丙午马年</div>
        </div>
        <div class="slot-ui" id="s-v">当前时辰：午时</div>
        <div class="cd-ui">距离 <b>清明节 (5/4)</b> 还有 <span class="cd-n" id="c-v">9</span> 天</div>
        <button class="btn-call" id="toggle-btn" onclick="toggleCalendar()">查看月历</button>
    </div>

    <div id="calendar-area">
        <div id="calendar-content" class="detail-item"></div>
    </div>

    <script>
        function toggleCalendar() {
            const area = document.getElementById('calendar-area');
            const btn = document.getElementById('toggle-btn');
            
            if (area.style.display === 'block') {
                area.style.display = 'none';
                btn.innerText = '查看月历';
            } else {
                const l = Lunar.fromDate(new Date());
                // 维持已修复的正确 API：getDayYi / getDayJi
                document.getElementById('calendar-content').innerHTML = `
                    <div style="text-align:center; font-weight:bold; color:var(--red); margin-bottom:15px; font-size:1.2rem;">今日万年历</div>
                    <b>干支：</b>${l.getYearInGanZhi()}年 ${l.getMonthInGanZhi()}月 ${l.getDayInGanZhi()}日<br>
                    <b>五行：</b>${l.getYearNaYin()}<br>
                    <b>宜：</b>${l.getDayYi().slice(0, 5).join(' ')}<br>
                    <b>忌：</b>${l.getDayJi().slice(0, 5).join(' ')}
                `;
                area.style.display = 'block';
                btn.innerText = '隐藏月历';
                // 自动滚动到底部以便查看
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function run() {
            const now = new Date();
            document.getElementById('cur-time').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            
            const target = new Date(2026, 3, 5); 
            const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            document.getElementById('c-v').innerText = diff > 0 ? diff : 0;
        }
        setInterval(run, 1000);
        run();
    </script>
</body>
</html>

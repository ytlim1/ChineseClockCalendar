name: Convert README to HTML

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  convert_readme:
    runs-on: ubuntu-latest
    # 关键点：赋予 Action 写入仓库的权限
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Convert Markdown to HTML
        uses: alex-page/github-project-pages-action@v2
        with:
          theme: 'github'
          input: 'README.md'
          output: 'README.html'

      - name: Commit and Push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 只有在文件确实生成或改变时才提交，防止报错
          if [ -f README.html ]; then
            git add README.html
            git commit -m "Auto-update README.html" || exit 0
            git push
          fi
          

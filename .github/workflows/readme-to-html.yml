name: Convert README to HTML

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  convert_readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 使用 Ubuntu 系统自带的 pandoc，不依赖外部 Action 插件
      - name: Build HTML using Pandoc
        run: |
          pandoc README.md -s -o README.html --metadata title="Project Help"

      - name: Commit and Push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f README.html ]; then
            git add README.html
            # 只有在内容真的改变时才提交
            git commit -m "Auto-update README.html (Timestamp: $(date))" || echo "No changes to commit"
            git push origin main
          else
            echo "README.html generation failed"
            exit 1
          fi

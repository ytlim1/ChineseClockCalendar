name: Convert README to HTML

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  convert_readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 解决 127 错误：手动安装 pandoc
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # 转换并注入简单的 CSS 让它在手机上更好看
      - name: Build HTML using Pandoc
        run: |
          pandoc README.md -s -o README.html \
          --metadata title="Project Help" \
          -V header-includes='<style>body{max-width:800px;margin:40px auto;padding:0 20px;line-height:1.6;font-family:sans-serif;color:#333}img{max-width:100%}</style>'

      - name: Commit and Push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f README.html ]; then
            git add README.html
            git commit -m "Auto-update README.html (Timestamp: $(date))" || echo "No changes to commit"
            git push origin main
          else
            echo "README.html generation failed"
            exit 1
          fi

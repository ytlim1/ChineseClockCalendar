name: Convert README to HTML

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  convert_readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 使用一个极其稳定的转换工具
      - name: Build HTML from Markdown
        uses: focalpoint/markdown-action@v0.1.1
        with:
          input_file: "README.md"
          output_file: "README.html"

      - name: Commit and Push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否生成
          if [ -f README.html ]; then
            git add README.html
            git commit -m "Auto-update README.html (Timestamp: $(date))" || echo "No changes to commit"
            git push origin main
          else
            echo "README.html generation failed"
            exit 1
          fi
